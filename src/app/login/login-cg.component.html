<div class="h-screen overflow-auto">
  <div class="flex items-center justify-center min-h-screen">
    <div class="bg-white shadow-xl rounded-lg p-8 w-full max-w-md">
      <h1 class="text-2xl font-bold text-center mb-6">Login</h1>
      
      <form [formGroup]="form" (ngSubmit)="loguearse()" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700">Usuario</label>
          <input 
            type="text" 
            formControlName="nombre_usuario"
            class="mt-1 block w-full rounded-md border-gray-300 shadow-sm 
                   focus:border-blue-500 focus:ring-blue-500 p-2 border"
            placeholder="Usuario">
          @if (form.get('nombre_usuario')?.hasError('required') && 
               form.get('nombre_usuario')?.touched) {
            <p class="text-red-500 text-sm mt-1">Campo requerido</p>
          }
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700">Contraseña</label>
          <div class="relative">
            <input 
              [type]="passwordMode" 
              formControlName="password"
              class="mt-1 block w-full rounded-md border-gray-300 shadow-sm 
                     focus:border-blue-500 focus:ring-blue-500 p-2 border"
              placeholder="Contraseña">
            <button 
              type="button"
              (click)="togglePassword()"
              class="absolute right-2 top-3 text-gray-500">
              {{ passwordMode === 'password' ? '👁️' : '🙈' }}
            </button>
          </div>
          @if (form.get('password')?.hasError('required') && 
               form.get('password')?.touched) {
            <p class="text-red-500 text-sm mt-1">Requerido</p>
          }
        </div>

        <button 
          type="submit" 
          [disabled]="!form.valid || loading"
          class="w-full bg-blue-500 text-white py-2 px-4 rounded-md 
                 hover:bg-blue-600 disabled:bg-gray-400 disabled:cursor-not-allowed
                 flex items-center justify-center">
          @if (loading) {
            <span class="animate-spin mr-2">⟳</span>
          }
          Ingresar
        </button>
      </form>

      @if (mensajeError) {
        <div class="mt-4 bg-red-100 border border-red-400 text-red-700 
                    px-4 py-3 rounded relative">
          <span>{{ mensajeError }}</span>
          <button 
            class="absolute top-0 bottom-0 right-0 px-4 py-3"
            (click)="mensajeError = ''">
            ✕
          </button>
        </div>
      }
    </div>
  </div>
</div>
