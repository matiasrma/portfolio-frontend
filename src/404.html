<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
  <script>
    // Preserve the path and redirect to index.html
    var segmentCount = 1; // Number of path segments to preserve (for /portfolio-frontend/)
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      '/portfolio-frontend/' +
      (l.pathname.split('/').slice(segmentCount + 1).join('/') || '') +
      (l.search || '') +
      (l.hash || '')
    );
  </script>
</head>
<body>
  Redirecting...
</body>
</html>
